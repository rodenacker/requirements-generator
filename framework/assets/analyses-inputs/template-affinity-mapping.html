<!--
  ROLE: asset (HTML template). Populated by framework/agents/analyses-inputs/affinity-mapping-analyser.md.

  Purpose: HTML/CSS skeleton for the inputs-side affinity-mapping artefact.
  KJ-method bottom-up clusters + Beyer/Holtzblatt insight-statement labels +
  Pass-1/Pass-2 anti-anchoring discipline via sub-agent isolation +
  Jaccard-similarity drift detection.

  Self-contained (`<!doctype html>` + inlined `<style>` + `<body>`). No
  external CSS/JS dependencies, no CDN, no `<script>` behaviour, no inline
  Mermaid runtime; viewable by opening `file://` in a browser; shareable with
  clients without tooling. The two diagrams (primary mindmap + conditional
  cross-cluster tensions graph) are pre-rendered inline `<svg>` — geometry
  computed by the analyser at render time. The Mermaid source is embedded as
  text inside `<pre class="mermaid-source">` for export only (collapsed
  `<details>`); the rendered visual is the inline `<svg>`.

  The artefact is re-ingestible into `input/` for the /requirements drafter
  via markitdown conversion:
  - The pre-rendered inline <svg> mindmap (+ optional tensions graph) carry
    the visible diagrams.
  - The Mermaid `mindmap` and conditional `flowchart TD` blocks (inside
    `<pre class="mermaid-source">`) survive as fenced ```mermaid code blocks —
    the export / re-ingestion adjunct.
  - The embedded JSON body block (inside `<pre><code class="language-json">`)
    survives as a fenced ```json code block. This is the load-bearing
    machine-readable contract — the `<script type="application/json">` meta
    block in `<head>` is stripped by markitdown and is only used by the
    drift-detection logic on subsequent affinity-mapping runs.
  - Inline `[SRC: <filename>]` markers in cell / row / node content survive
    as plain text.
  - The cluster-card CSS grid layout does not survive layout-wise; its
    text content survives as enumerated list items.

  Section order (top-to-bottom — diagram-first ordering is the user's
  hard requirement):
    1. Overview (id="overview")              — title, one-line caption,
                                                meta-grid (manifest sha +
                                                counts), jump-links to the
                                                diagrams and downstream
                                                sections.
    2. Primary mindmap (id="diagram-primary") — {{PRIMARY_MINDMAP_SVG}}
                                                (pre-rendered inline-SVG
                                                hub-and-spoke: root → L3
                                                super-themes → L2 clusters)
                                                above {{PRIMARY_MINDMAP_MERMAID}}
                                                (adjacent collapsed
                                                mermaid-source <details>).
                                                The diagram-first deliverable.
    3. Tensions diagram (id="diagram-tensions") — {{TENSIONS_BLOCK}}: when
                                                tensions.length >= 1, a
                                                pre-rendered inline-SVG
                                                directed graph above a
                                                collapsed Mermaid `flowchart
                                                TD` <details>; otherwise a
                                                deterministic "no tensions"
                                                copy so the section header
                                                is always present.
    4. Source roster (id="source-roster")    — {{SOURCE_ROSTER_BLOCK}}:
                                                Consumed + Skipped tables.
    5. Cluster cards (id="clusters")         — {{CLUSTER_CARDS}}: one
                                                <section class="super-theme">
                                                per L3 super-theme,
                                                containing one
                                                <article class="cluster-card">
                                                per L2 cluster. Each card
                                                lists every member note
                                                verbatim with [SRC:] and a
                                                stable/drifted chip.
    6. Orphans (id="orphans")                — {{ORPHANS_BLOCK}}:
                                                parking-lot table.
    7. Affinity-map body (id="affinity-map-body")
                                              — {{AFFINITY_MAP_JSON_BLOCK}}:
                                                <pre><code
                                                class="language-json"
                                                id="affinity-map-body">
                                                carrying the full
                                                machine-readable hierarchy.
                                                The load-bearing
                                                markitdown-survival contract.
    8. Diagnostics (id="diagnostics")        — <details> wrapper, collapsed
                                                by default. Manifest sha256,
                                                run history, Pass-1/Pass-2
                                                Jaccard drift log, 10 gate
                                                results, cluster-size
                                                distribution, thin-cluster
                                                flags, recommended
                                                consultant follow-up
                                                questions.

  Placeholders the analyser substitutes (string substitution, all values
  pre-escaped for HTML; JSON inside `<pre><code>` escaped as plain text;
  Mermaid inside `<pre class="mermaid-source">` is NOT HTML-escaped beyond
  the standard `<`, `>`, `&`, `"`, `'` set — Mermaid pipe `|`, bracket
  `[`, `]`, paren `(`, `)`, brace `{`, `}` syntax must remain literal):

    {{TITLE}}                       — short title (e.g. "Affinity Map (inputs) — Project X").
    {{DOMAIN}}                      — domain string (from manifest meta if declared, else
                                      "(not declared in manifest)").
    {{GENERATED_AT}}                — ISO-8601 UTC timestamp the artefact was rendered.
    {{MANIFEST_SHA256}}             — sha256 of requirements/source-manifest.json at read time.
    {{RUN_COUNT}}                   — integer ≥ 1, increments per run.
    {{TARGET}}                      — "prototype" | "application" | "(not declared in manifest)".
    {{NOTE_COUNT}}                  — total notes extracted in Round 1.
    {{CLUSTER_COUNT}}               — total L2 clusters.
    {{SUPER_THEME_COUNT}}           — total L3 super-themes (4–8 per Gate 4).
    {{ORPHAN_COUNT}}                — total notes in the parking-lot.
    {{TENSION_COUNT}}               — total cross-cluster tensions surfaced.
    {{DRIFTED_NOTE_COUNT}}          — count of notes with confidence: drifted.
    {{CONSUMED_ROW_COUNT}}          — manifest rows consumed.
    {{SKIPPED_ROW_COUNT}}           — manifest rows skipped (Unsupported tier).
    {{IRRELEVANT_ROW_COUNT}}        — consumed rows marked irrelevant-to-domain (Gate 8).
    {{PRIMARY_MINDMAP_SVG}}         — pre-rendered <figure class="affinity-mindmap">
                                      containing ONE inline <svg> (root → L3
                                      super-theme → L2 cluster hub-and-spoke).
                                      The "MUST contain a diagram" deliverable.
                                      See MINDMAP SVG SCHEMA below.
    {{PRIMARY_MINDMAP_MERMAID}}     — pre-rendered collapsed <details class="mermaid-block">
                                      containing <pre class="mermaid-source"> with the
                                      `mindmap` source (export / re-ingestion adjunct;
                                      literal pipes, brackets, parens preserved).
    {{TENSIONS_BLOCK}}              — pre-rendered block. When tension_count >= 1,
                                      a <figure class="affinity-tensions"> inline <svg>
                                      (directed graph; see TENSIONS SVG SCHEMA below)
                                      above a collapsed `<details class="mermaid-block">`
                                      with the secondary `flowchart TD` source. When 0,
                                      `<p class="no-tensions">No cross-cluster
                                      tensions surfaced in the corpus.</p>`.
    {{SOURCE_ROSTER_BLOCK}}         — pre-rendered <section id="source-roster">
                                      containing Consumed + Skipped tables per
                                      SOURCE ROSTER SCHEMA.
    {{CLUSTER_CARDS}}               — pre-rendered concatenation of one
                                      <section class="super-theme"> per L3
                                      super-theme, each containing one
                                      <article class="cluster-card"> per L2
                                      cluster per CLUSTER CARD SCHEMA below.
    {{ORPHANS_BLOCK}}               — pre-rendered <section id="orphans">
                                      containing the parking-lot <table> per
                                      ORPHANS SCHEMA below.
    {{AFFINITY_MAP_JSON_BLOCK}}     — pre-rendered <section id="affinity-map-body">
                                      containing a single
                                      <pre><code class="language-json"
                                      id="affinity-map-body">…</code></pre>.
                                      Full machine-readable hierarchy per the
                                      JSON SCHEMA in
                                      framework/assets/analyses-inputs/affinity-mapping-reference.md.
    {{DIAGNOSTICS_BLOCK}}           — pre-rendered <section class="diagnostics">
                                      per DIAGNOSTICS SCHEMA.

  Output: analyse-inputs/AFFINITY-MAPPING/affinity-map.html.

  MINDMAP SVG SCHEMA — {{PRIMARY_MINDMAP_SVG}} substitutes a single
  <figure class="affinity-mindmap"> containing ONE inline <svg>. The analyser
  computes geometry at render time: a top-down three-tier column layout — root
  at top centre; one column per L3 super-theme in a left-to-right row beneath
  the root; the super-theme's L2 clusters stacked vertically inside its column.
  Node-level leaves (notes) are NOT drawn (≤ 34 nodes: 1 root + ≤ 8 super-themes
  + ≤ 25 clusters). All <text> XML-escaped. Conventions:
    - viewBox "0 0 W H" — W = PAD*2 + COL_W*S (S = super-theme count); H from the
      tallest column (root + super row + max clusters-in-any-column).
    - role="img" + aria-label on the <svg>.
    - Edges first (drawn under nodes), then node <g> groups.
    - root: <g class="node"><rect class="am-node am-root" rx="14"/> + <text class="am-text am-root-label">.
    - super-theme: <g class="node"><rect class="am-node am-super" rx="6"/> + <text class="am-text am-super-label"> (label wraps ≤ 2 lines via <tspan>).
    - cluster: <g class="node"><rect class="am-node am-cluster" rx="4"/> + <text class="am-text am-cluster-label"> (label wraps ≤ 2 lines via <tspan>).
    - root→super edge: <path class="am-edge am-edge-rs" d="M … C …"/> (one per super-theme, cubic from root bottom to super top).
    - super→cluster edges: a left-gutter bus per column — one vertical <path class="am-edge am-edge-sc"> spine just LEFT of the column's node boxes (so it crosses no node), with a short horizontal connector from the spine into each cluster's left edge (endpoint-anchored). Never route a super→cluster line straight down the column centre through the stacked cluster boxes.

      <figure class="affinity-mindmap" aria-labelledby="affinity-mindmap-cap">
        <figcaption id="affinity-mindmap-cap">Affinity mindmap — root → super-themes (L3) → clusters (L2).</figcaption>
        <svg viewBox="0 0 W H" role="img" aria-label="Affinity mindmap of the inputs">
          <!-- edges first (under nodes), then node <g> groups -->
        </svg>
      </figure>

  TENSIONS SVG SCHEMA — when tension_count >= 1, {{TENSIONS_BLOCK}} leads with a
  single <figure class="affinity-tensions"> containing ONE inline <svg>: a small
  directed graph of the L2 clusters involved in any tension, laid out in a single
  horizontal row, with one curved edge per tension (description label centred on
  the edge over an opaque background rect). All <text> XML-escaped. Conventions:
    - viewBox "0 0 W H" — W from the tension-node count; H fixed (row + arc band).
    - role="img" + aria-label on the <svg>.
    - tension node: <g class="node"><rect class="am-node at-node" rx="4"/> + <text class="at-text at-node-label"> (truncated insight statement). The `am-node` marker is the svg-overlap-check node class (shared with the mindmap rects); `at-node` carries the tension styling.
    - tension edge: <path class="at-edge" d="M … C …"/> (one per tension; arc above the row).
    - edge label: <rect class="at-label-bg"/> (opaque) under a <text class="at-label"> at the arc apex.
  When tension_count == 0, {{TENSIONS_BLOCK}} is the
  `<p class="no-tensions">No cross-cluster tensions surfaced in the corpus.</p>` literal.

  CLUSTER CARD SCHEMA — {{CLUSTER_CARDS}} substitutes a concatenation of
  L3 super-theme sections; each super-theme contains one cluster card per
  member L2 cluster:

      <section class="super-theme" id="super-theme-{slug}"
               aria-labelledby="super-theme-{slug}-title">
        <header class="super-theme-header">
          <h2 id="super-theme-{slug}-title">
            <span class="st-id">{{st_id}}</span>
            <span class="st-label">{{insight_statement_label}}</span>
          </h2>
          <p class="caption">{{n_clusters}} clusters · {{n_notes}} notes total.</p>
        </header>

        <article class="cluster-card" id="cluster-{slug}"
                 aria-labelledby="cluster-{slug}-title">
          <header class="cluster-header">
            <h3 id="cluster-{slug}-title">
              <span class="th-id">{{th_id}}</span>
              <span class="th-label">{{insight_statement_label}}</span>
            </h3>
            <ul class="cluster-meta">
              <li class="note-count">{{note_count}} notes</li>
              <li class="confidence-summary">
                <span class="conf-stable">stable: {{n_stable}}</span> ·
                <span class="conf-drifted">drifted: {{n_drifted}}</span>
              </li>
              <!-- Optional thin flag if note_count < 3 and consultant accepted -->
              <li class="thin-flag" hidden>thin: needs-more-input</li>
            </ul>
          </header>

          <blockquote class="representative-quote">
            <p>{{representative_quote_text}}</p>
            <footer>
              <small class="src-inline">[SRC: {{representative_quote_source}}]</small>
            </footer>
          </blockquote>

          <ol class="cluster-notes">
            <li class="note" data-confidence="{{stable|drifted}}">
              <span class="note-id">{{n_id}}</span>
              <span class="note-text">{{verbatim_note_text}}</span>
              <small class="src-inline">[SRC: {{filename}}]</small>
              <span class="conf-chip conf-{{stable|drifted}}">
                {{stable|drifted}}
                <span class="jaccard">J={{jaccard_value}}</span>
              </span>
              <!-- When drifted, append Pass-2's competing cluster label -->
              <span class="drift-target" hidden>
                Pass-2 placed with: {{pass2_label_truncated}}
              </span>
            </li>
            ...
          </ol>
        </article>
        ...
      </section>

  ORPHANS SCHEMA — {{ORPHANS_BLOCK}} substitutes:

      <section id="orphans" aria-labelledby="orphans-title">
        <h2 id="orphans-title">Orphans (parking-lot)</h2>
        <p class="caption">
          Notes that fit no cluster on either Pass-1 or Pass-2.
          Preserved as signal — edge cases, unstated assumptions,
          future-scope hints, single-stakeholder concerns.
          Each carries [SRC: <filename>] and a one-line "why no cluster" reason.
        </p>
        <table class="orphans-table">
          <thead>
            <tr><th>ID</th><th>Note text</th><th>Source</th><th>Reason</th></tr>
          </thead>
          <tbody>
            <tr>
              <td class="orphan-id">{{n_id}}</td>
              <td class="orphan-text">{{verbatim_text}}</td>
              <td class="orphan-source"><small class="src-inline">[SRC: {{filename}}]</small></td>
              <td class="orphan-reason">{{reason}}</td>
            </tr>
            ...
            <!-- When orphans.length == 0: -->
            <tr class="empty">
              <td colspan="4" class="empty">
                (no orphans this run — see Diagnostics for the explicit
                "no orphans" justification per Gate 5)
              </td>
            </tr>
          </tbody>
        </table>
      </section>

  SOURCE ROSTER SCHEMA — {{SOURCE_ROSTER_BLOCK}} substitutes:

      <section id="source-roster" aria-labelledby="source-roster-title">
        <h2 id="source-roster-title">Source roster</h2>
        <p class="caption">Every consumable manifest row, with note counts
          contributed and any sources marked irrelevant-to-domain by Gate 8.</p>

        <h3>Consumed</h3>
        <table class="source-table consumed">
          <thead>
            <tr><th>Filename</th><th>Tier</th><th>SHA-256</th><th>Notes contributed</th></tr>
          </thead>
          <tbody>
            <tr><td>{{filename}}</td><td>{{tier}}</td>
                <td class="sha">{{sha256_8}}</td>
                <td class="count">{{note_count}}</td></tr>
            ...
          </tbody>
        </table>

        <h3>Skipped</h3>
        <table class="source-table skipped">
          <thead><tr><th>Filename</th><th>Reason</th></tr></thead>
          <tbody>
            <tr><td>{{filename}}</td><td>{{reason}}</td></tr>
            ...
            <!-- If empty: <tr><td colspan="2" class="empty">(no skipped rows this run)</td></tr> -->
          </tbody>
        </table>
      </section>

  AFFINITY MAP JSON BLOCK SCHEMA — {{AFFINITY_MAP_JSON_BLOCK}} substitutes:

      <section id="affinity-map-body" aria-labelledby="affinity-map-body-title">
        <h2 id="affinity-map-body-title">Affinity map (machine-readable)</h2>
        <p class="caption">
          The full hierarchy in JSON. This block survives markitdown HTML→MD
          conversion as a fenced <code>```json</code> code block, so when the
          artefact is copied into <code>input/</code> for /requirements
          re-ingestion, the drafter consumes the complete model in one shot:
          super-themes feed §1 vision anchors, clusters feed §5 task-flow
          groupings and §3 acceptance-criteria threads, orphans feed §10
          out-of-scope candidates, tensions feed §6 trade-off-aware
          acceptance-criteria branches.
        </p>
        <pre><code class="language-json" id="affinity-map-body">{{affinity_map_json}}</code></pre>
      </section>

  JSON SCHEMA — see framework/assets/analyses-inputs/affinity-mapping-reference.md
  > "JSON body schema". The block contains schema_version, manifest_sha256,
  generated_at, run_count, domain, target, source_roster, super_themes,

  DIAGNOSTICS SCHEMA — the analyser's {{DIAGNOSTICS_BLOCK}} substitutes a
  single <section class="diagnostics">. The template wraps the placeholder
  in a <details id="diagnostics" class="diagnostics-toggle"> element
  (collapsed by default). The inner section contains, in order:

      <section class="diagnostics">
        <h2>Diagnostics</h2>
        <p>Affinity map (inputs) — {{NOTE_COUNT}} notes, {{CLUSTER_COUNT}}
           clusters, {{SUPER_THEME_COUNT}} super-themes.</p>
        <p>Anti-anchoring: Pass-2 sub-agent re-cluster placed
           {{DRIFTED_NOTE_COUNT}} notes outside their Pass-1 cluster

        <table class="drift-log">

            <tr>

              <th>Note (truncated)</th>
              <th>Pass-1 cluster</th>
              <th>Pass-2 cluster</th>

          <tbody>
            <tr>

              <td>{{note_text_truncated}}</td>
              <td>{{th_id}} {{pass1_label_truncated}}</td>
              <td>{{pass2_label_truncated}}</td>
              <td class="jaccard">{{jaccard_value}}</td>
            </tr>
            ...
            <!-- If empty: <tr><td colspan="5" class="empty">(no drifted notes — Pass-2 corroborated Pass-1 placements for every note)</td></tr> -->
          </tbody>
        </table>

        <h3>Quality gates (10)</h3>
        <ul class="gate-results">
          <li class="gate-pass|gate-fail|gate-warn">Gate 1 — Citation completeness.</li>
          ... (all 10 gates listed in order)

        <h3>Cluster-size distribution</h3>
        <table class="cluster-size-distribution">
          <thead>
            <tr><th>Cluster</th><th>Notes</th><th>% of total</th><th>Status</th></tr>
          </thead>
          <tbody>
            <tr>
              <td>{{th_id}} {{th_label_truncated}}</td>
              <td>{{note_count}}</td>
              <td>{{pct_of_total}}%</td>
              <td>{{ok|thin|inflated}}</td>
            </tr>
            ...
          </tbody>
        </table>

        <h3>Irrelevant-to-domain rows ({{IRRELEVANT_ROW_COUNT}}) (Gate 8 emissions)</h3>
        <ul class="irrelevant-log">
          <li><code>{{filename}}</code> — {{reason}}</li>
          ...
          <!-- If empty: <li class="empty">(every consumed row contributed at least one note)</li> -->
        </ul>

        <h3>Recommended consultant follow-up questions</h3>
        <ul class="follow-ups">
          <li>{{question}} <small>(prompted by: {{trigger — e.g. "Gate 5 no-orphans justification"}})</small></li>
          ...
          <!-- If empty: <li class="empty">(no follow-up questions surfaced by this run)</li> -->
        </ul>

        <h3>Diagram validity</h3>
        <p class="diagram-status">

          Tensions SVG: {{n/a|pass|overlap-warning}}.
        </p>

        <h3>Run history</h3>
        <ul class="run-history">

          <li>Run {{run_count}} — {{ISO-8601-date}} — {{n_notes}} notes,
              {{n_clusters}} clusters, {{n_super_themes}} super-themes,
              {{n_orphans}} orphans, {{n_tensions}} tensions,
              {{n_drifted}} drifted; mode: {{full|append-new-notes-only}}
              {{; Override: <gate list> if applicable}}.</li>
          ...

        <!-- Override-only: flagged-items <ul> per failed gate. -->

  CSS classes used by the analyser:
    figure.affinity-mindmap            — <figure> wrapping the pre-rendered inline mindmap SVG.
    figure.affinity-tensions           — <figure> wrapping the pre-rendered inline tensions SVG.
    details.mermaid-block              — <details> wrapping a <pre class="mermaid-source"> export adjunct (collapsed).
    SVG mindmap: .am-node .am-root .am-super .am-cluster (node rects);
                 .am-edge .am-edge-rs .am-edge-sc (edges);
                 .am-text .am-root-label .am-super-label .am-cluster-label (labels).
    SVG tensions: .am-node + .at-node (node rects — `am-node` is the shared svg-overlap node marker); .at-edge (edges);

    .super-theme                       — wrapper for an L3 group of clusters.
    .cluster-card                      — wrapper for a single L2 cluster.
    .cluster-notes                     — ordered list of member notes.
    .conf-chip.conf-stable             — green stable-confidence chip.
    .conf-chip.conf-drifted            — orange drifted-confidence chip.
    .conf-summary .conf-stable         — small summary chip in cluster header.
    .conf-summary .conf-drifted        — small summary chip in cluster header.
    .thin-flag                         — sand-coloured chip for thin clusters.
    .representative-quote              — pull-quote callout in cluster card.
    .orphans-table                     — parking-lot table.
    .drift-log                         — Pass-1 vs Pass-2 Jaccard drift log table.
    .cluster-size-distribution         — diagnostics table of cluster sizes.

      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 { font-size: 22px; font-weight: 600; margin: 0 0 4px 0; }
    h2 { font-size: 16px; margin: 24px 0 8px 0; }
    h3 {
      font-size: 13px;
      margin: 14px 0 6px 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 16px 0;
    }

    .caption {
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 12px 0;
    }

    /* ------- overview / meta-grid / jump-links ------- */

    #overview {
      margin-bottom: 24px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px 24px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .meta-grid dt {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0;
    }
    .meta-grid dd {
      margin: 0 0 6px 0;
      font-variant-numeric: tabular-nums;
    }

    .jump-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border-strong);
      border-radius: 6px;
      font-size: 13px;
      margin: 0 0 24px 0;
    }
    .jump-links a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px dotted var(--border-strong);
    }
    .jump-links a:hover { border-bottom-color: var(--fg); }

    /* ------- src-inline ------- */

    .src-inline {
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 11px;
      background: var(--code-bg);
      padding: 0 4px;
      border-radius: 3px;
      white-space: nowrap;
      margin-left: 4px;
    }

    /* ------- diagrams: inline SVG (mindmap + tensions) ------- */

    section#diagram-primary,
    section#diagram-tensions {
      margin: 0 0 24px 0;
    }
    section#diagram-primary > h2,
    section#diagram-tensions > h2 {
      margin-top: 0;
    }
    figure.affinity-mindmap,
    figure.affinity-tensions {
      margin: 8px 0 12px 0;
      padding: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    figure.affinity-mindmap figcaption,
    figure.affinity-tensions figcaption {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
    }
    figure.affinity-mindmap svg,
    figure.affinity-tensions svg {
      width: 100%;
      height: auto;
      display: block;
      background: #fcfcfc;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    figure.affinity-mindmap svg text,
    figure.affinity-tensions svg text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    /* mindmap nodes + edges */
    figure.affinity-mindmap svg .am-edge { fill: none; stroke: #9aa0a0; stroke-width: 1.4; }
    figure.affinity-mindmap svg .am-edge-rs { stroke: var(--super-theme-border); }
    figure.affinity-mindmap svg .am-edge-sc { stroke: var(--cluster-border); }
    figure.affinity-mindmap svg .am-root    { fill: var(--super-theme-bg); stroke: var(--super-theme-border); stroke-width: 1.5; }
    figure.affinity-mindmap svg .am-super   { fill: var(--super-theme-bg); stroke: var(--super-theme-border); stroke-width: 1.3; }
    figure.affinity-mindmap svg .am-cluster { fill: var(--cluster-bg);     stroke: var(--cluster-border);     stroke-width: 1.2; }
    figure.affinity-mindmap svg .am-root-label    { fill: var(--super-theme-fg); font-size: 13px; font-weight: 700; text-anchor: middle; }
    figure.affinity-mindmap svg .am-super-label   { fill: var(--super-theme-fg); font-size: 12px; font-weight: 600; text-anchor: middle; }
    figure.affinity-mindmap svg .am-cluster-label { fill: var(--cluster-fg);     font-size: 11px; text-anchor: middle; }
    /* tensions nodes + edges */
    figure.affinity-tensions svg .at-edge { fill: none; stroke: var(--tension-border); stroke-width: 1.5; }
    figure.affinity-tensions svg .at-node { fill: var(--cluster-bg); stroke: var(--cluster-border); stroke-width: 1.2; }
    figure.affinity-tensions svg .at-node-label { fill: var(--cluster-fg); font-size: 11px; text-anchor: middle; }
    figure.affinity-tensions svg .at-label-bg { fill: #ffffff; opacity: 0.92; }
    figure.affinity-tensions svg .at-label { fill: var(--tension-fg); font-size: 11px; font-weight: 600; text-anchor: middle; }

    /* ------- mermaid export adjunct (collapsed) ------- */

    details.mermaid-block {
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      padding: 10px 14px;
      margin: 0 0 24px 0;
      background: #fff;
    }
    details.mermaid-block > summary {
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      color: var(--fg);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    details.mermaid-block > summary::-webkit-details-marker { display: none; }
    details.mermaid-block > summary::before {
      content: "▶";
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.15s ease;
      display: inline-block;
    }
    details.mermaid-block[open] > summary::before { transform: rotate(90deg); }
    .mermaid-caption {
      color: var(--muted);
      font-size: 12px;
      margin: 8px 0 8px 0;
    }
    .mermaid-caption code, .mermaid-caption a {
      font-family: ui-monospace, monospace;
      font-size: 0.92em;
    }
    pre.mermaid-source {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
      color: #111827;
      margin: 0;
    }
    .no-tensions {
      color: var(--muted);
      font-style: italic;
      margin: 4px 0;
    }

    /* ------- source roster ------- */

    #source-roster {
      padding: 16px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border-strong);
      border-radius: 6px;
      background: #fff;
      margin-bottom: 24px;
    }
    #source-roster h2 { margin-top: 0; }
    table.source-table {
      width: 100%;
      border-collapse: collapse;
      margin: 4px 0 12px 0;
      font-size: 12px;
    }
    table.source-table th,
    table.source-table td {
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    table.source-table thead th {
      background: var(--header-bg);
      font-weight: 600;
      border-top: none;
      border-bottom: 2px solid var(--border-strong);
    }
    table.source-table .sha,
    table.source-table .count {
      font-variant-numeric: tabular-nums;
      font-family: ui-monospace, monospace;
    }
    table.source-table .empty {
      color: var(--muted);
      font-style: italic;
      text-align: center;
    }

    /* ------- super-theme + cluster cards ------- */

    section.super-theme {
      margin: 0 0 24px 0;
      padding: 12px 14px;
      background: var(--super-theme-bg);
      border: 1px solid var(--super-theme-border);
      border-radius: 8px;
    }
    .super-theme-header h2 {
      margin: 0;
      color: var(--super-theme-fg);
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .super-theme-header .st-id {
      font-family: ui-monospace, monospace;
      font-size: 13px;
      background: #fff;
      color: var(--super-theme-fg);
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid var(--super-theme-border);
    }
    .super-theme-header .caption {
      margin: 4px 0 0 0;
    }

    article.cluster-card {
      margin: 12px 0;
      padding: 12px 14px;
      background: var(--cluster-bg);
      border: 1px solid var(--cluster-border);
      border-left: 4px solid var(--cluster-border);
      border-radius: 6px;
    }
    .cluster-header h3 {
      margin: 0 0 6px 0;
      color: var(--cluster-fg);
      font-size: 14px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cluster-header .th-id {
      font-family: ui-monospace, monospace;
      font-size: 12px;
      background: var(--code-bg);
      color: var(--cluster-fg);
      padding: 1px 5px;
      border-radius: 3px;
      border: 1px solid var(--cluster-border);
    }
    .cluster-meta {
      list-style: none;
      padding: 0;
      margin: 0 0 8px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 16px;
      font-size: 12px;
      color: var(--muted);
    }
    .cluster-meta .conf-stable {
      color: var(--stable-fg);
      font-weight: 600;
    }
    .cluster-meta .conf-drifted {
      color: var(--drifted-fg);
      font-weight: 600;
    }
    .cluster-meta .thin-flag {
      background: var(--thin-bg);
      color: var(--thin-fg);
      border: 1px solid var(--thin-border);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 600;
    }

    blockquote.representative-quote {
      margin: 8px 0;
      padding: 8px 12px;
      background: var(--code-bg);
      border-left: 3px solid var(--super-theme-border);
      border-radius: 0 4px 4px 0;
      font-style: italic;
      color: var(--fg);
    }
    blockquote.representative-quote p { margin: 0; }
    blockquote.representative-quote footer {
      margin-top: 4px;
      font-style: normal;
      font-size: 11px;
    }

    ol.cluster-notes {
      margin: 8px 0 0 0;
      padding-left: 20px;
      font-size: 13px;
    }
    ol.cluster-notes li.note {
      padding: 4px 0;
      border-top: 1px dashed var(--note-border);
      line-height: 1.5;
    }
    ol.cluster-notes li.note:first-child { border-top: none; }
    .note-id {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-right: 6px;
    }
    .conf-chip {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 3px;
      vertical-align: baseline;
    }
    .conf-chip.conf-stable {
      background: var(--stable-bg);
      color: var(--stable-fg);
      border: 1px solid var(--stable-border);
    }
    .conf-chip.conf-drifted {
      background: var(--drifted-bg);
      color: var(--drifted-fg);
      border: 1px solid var(--drifted-border);
    }
    .conf-chip .jaccard {
      font-family: ui-monospace, monospace;
      font-size: 10px;
      margin-left: 4px;
      opacity: 0.85;
    }
    .drift-target {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      color: var(--drifted-fg);
      font-style: italic;
    }
    li.note[data-confidence="drifted"] .drift-target { display: inline; }

    /* ------- orphans ------- */

    #orphans {
      margin-bottom: 24px;
      padding: 16px;
      background: var(--orphan-bg);
      border: 1px solid var(--orphan-border);
      border-left: 4px solid var(--orphan-border);
      border-radius: 6px;
    }
    #orphans h2 {
      margin-top: 0;
      color: var(--orphan-fg);
    }
    table.orphans-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0;
      font-size: 13px;
    }
    table.orphans-table th,
    table.orphans-table td {
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    table.orphans-table thead th {
      background: #fff;
      font-weight: 600;
      border-top: none;
      border-bottom: 2px solid var(--orphan-border);
      color: var(--orphan-fg);
    }
    table.orphans-table .orphan-id {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }
    table.orphans-table .orphan-reason {
      font-style: italic;
      color: var(--orphan-fg);
    }
    table.orphans-table .empty {
      color: var(--muted);
      font-style: italic;
      text-align: center;
    }

    /* ------- affinity-map JSON body ------- */

    #affinity-map-body {
      padding: 16px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border-strong);
      border-radius: 6px;
      background: #fff;
      margin-bottom: 24px;
    }
    #affinity-map-body h2 { margin-top: 0; }
    #affinity-map-body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
      color: #111827;
      margin: 0;
      max-height: 520px;
    }

    /* ------- diagnostics ------- */

    details.diagnostics-toggle { margin-bottom: 24px; }
    details.diagnostics-toggle > summary {
      cursor: pointer;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border-strong);
      border-radius: 6px;
      font-weight: 600;
      font-size: 14px;
      color: var(--fg);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    details.diagnostics-toggle > summary::-webkit-details-marker { display: none; }
    details.diagnostics-toggle > summary::before {
      content: "▶";
      font-size: 10px;
      color: var(--muted);
      transition: transform 0.15s ease;
      display: inline-block;
    }
    details.diagnostics-toggle[open] > summary {
      border-radius: 6px 6px 0 0;
      border-bottom: none;
    }
    details.diagnostics-toggle[open] > summary::before { transform: rotate(90deg); }

    .diagnostics {
      padding: 16px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border-strong);
      border-radius: 6px;
      background: #fff;
      margin-bottom: 24px;
    }
    details.diagnostics-toggle > .diagnostics {
      border-top: none;
      border-radius: 0 0 6px 6px;
      margin-bottom: 0;
    }
    details.diagnostics-toggle > .diagnostics > h2 { display: none; }
    .diagnostics h2 { font-size: 16px; margin: 0 0 8px 0; }
    .diagnostics ul.gate-results,
    .diagnostics ul.irrelevant-log,
    .diagnostics ul.follow-ups,
    .diagnostics ul.run-history {
      margin: 0 0 12px 0;
      padding-left: 20px;
      font-size: 13px;
    }
    .diagnostics ul.gate-results li.gate-pass::before {
      content: "PASS ";
      color: var(--gate-pass);
      font-weight: 600;
    }
    .diagnostics ul.gate-results li.gate-fail::before {
      content: "FAIL ";
      color: var(--gate-fail);
      font-weight: 600;
    }
    .diagnostics ul.gate-results li.gate-warn::before {
      content: "WARN ";
      color: var(--gate-warn);
      font-weight: 600;
    }
    .diagnostics ul .empty {
      color: var(--muted);
      font-style: italic;
      list-style: none;
      margin-left: -16px;
    }
    .diagnostics code {
      font-family: ui-monospace, monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      padding: 0 4px;
      border-radius: 3px;
    }
    table.drift-log,
    table.cluster-size-distribution {
      width: 100%;
      border-collapse: collapse;
      margin: 4px 0 12px 0;
      font-size: 12px;
    }
    table.drift-log th,
    table.drift-log td,
    table.cluster-size-distribution th,
    table.cluster-size-distribution td {
      padding: 6px 8px;
      border-top: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }
    table.drift-log thead th,
    table.cluster-size-distribution thead th {
      background: var(--header-bg);
      font-weight: 600;
      border-top: none;
      border-bottom: 2px solid var(--border-strong);
    }
    table.drift-log .jaccard,
    table.cluster-size-distribution td:nth-child(2),
    table.cluster-size-distribution td:nth-child(3) {
      font-family: ui-monospace, monospace;
      font-variant-numeric: tabular-nums;
    }
    .diagram-status { font-size: 13px; margin: 0 0 12px 0; }

    /* ------- next-steps + footer ------- */

    section.next-steps {
      margin-top: 24px;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--super-theme-border);
      border-radius: 6px;
    }
    section.next-steps h2 { margin-top: 0; font-size: 14px; }
    section.next-steps p { color: var(--muted); margin: 6px 0; font-size: 13px; }
    section.next-steps code {
      font-family: ui-monospace, monospace;
      font-size: 0.92em;
      background: var(--code-bg);
      padding: 0 4px;
      border-radius: 3px;
    }

    footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
    }
    footer .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
    }
    footer .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    footer .legend-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border-left: 3px solid transparent;
    }
    footer .legend-swatch.s-super-theme {
      background: var(--super-theme-bg);
      border-left-color: var(--super-theme-border);
    }
    footer .legend-swatch.s-cluster {
      background: var(--cluster-bg);
      border-left-color: var(--cluster-border);
    }
    footer .legend-swatch.s-stable {
      background: var(--stable-bg);
      border-left-color: var(--stable-border);
    }
    footer .legend-swatch.s-drifted {
      background: var(--drifted-bg);
      border-left-color: var(--drifted-border);
    }
    footer .legend-swatch.s-orphan {
      background: var(--orphan-bg);
      border-left-color: var(--orphan-border);
    }
    footer .credit { margin-top: 6px; text-align: right; }

    @media print {
      body { background: #fff; }
      main { padding: 0; }
      section.super-theme { break-inside: avoid; }
      article.cluster-card { break-inside: avoid; }
      figure.affinity-mindmap, figure.affinity-tensions { break-inside: avoid; }
      details.mermaid-block { display: none; }
      details.diagnostics-toggle { display: none; }
      .jump-links { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <header id="overview">
      <h1>{{TITLE}}</h1>
      <p class="subtitle">Affinity map (inputs side) — KJ-method bottom-up clusters with Beyer/Holtzblatt insight-statement labels; sub-agent-isolated Pass-2 anti-anchoring control; Jaccard-similarity drift detection.</p>

      <dl class="meta-grid">
        <div><dt>Domain</dt><dd>{{DOMAIN}}</dd></div>
        <div><dt>Target</dt><dd>{{TARGET}}</dd></div>
        <div><dt>Generated</dt><dd>{{GENERATED_AT}}</dd></div>
        <div><dt>Manifest SHA-256</dt><dd>{{MANIFEST_SHA256}}</dd></div>
        <div><dt>Run #</dt><dd>{{RUN_COUNT}}</dd></div>
        <div><dt>Notes</dt><dd>{{NOTE_COUNT}}</dd></div>
        <div><dt>Clusters (L2)</dt><dd>{{CLUSTER_COUNT}}</dd></div>
        <div><dt>Super-themes (L3)</dt><dd>{{SUPER_THEME_COUNT}}</dd></div>
        <div><dt>Orphans</dt><dd>{{ORPHAN_COUNT}}</dd></div>
        <div><dt>Tensions</dt><dd>{{TENSION_COUNT}}</dd></div>
        <div><dt>Drifted notes</dt><dd>{{DRIFTED_NOTE_COUNT}}</dd></div>
        <div><dt>Consumed sources</dt><dd>{{CONSUMED_ROW_COUNT}}</dd></div>
        <div><dt>Skipped sources</dt><dd>{{SKIPPED_ROW_COUNT}}</dd></div>
        <div><dt>Irrelevant-to-domain</dt><dd>{{IRRELEVANT_ROW_COUNT}}</dd></div>
      </dl>

      <nav class="jump-links" aria-label="Sections">
        <a href="#diagram-primary">Mindmap</a>
        <a href="#diagram-tensions">Tensions</a>
        <a href="#source-roster">Source roster</a>
        <a href="#clusters">Cluster cards</a>
        <a href="#orphans">Orphans</a>
        <a href="#affinity-map-body">Machine-readable JSON</a>
        <a href="#diagnostics">Diagnostics</a>
      </nav>
    </header>

    <section id="diagram-primary" aria-labelledby="diagram-primary-title">
      <h2 id="diagram-primary-title">Affinity mindmap</h2>
      <p class="caption">
        Pre-rendered inline SVG — root → super-themes (L3) → clusters (L2).
        Note-level leaves excluded to keep the diagram legible (≤ 34 nodes).
        Full notes live in the cluster cards below. The Mermaid source is the
        collapsed export adjunct beneath the diagram.
      </p>
      {{PRIMARY_MINDMAP_SVG}}

      {{PRIMARY_MINDMAP_MERMAID}}
    </section>

    <section id="diagram-tensions" aria-labelledby="diagram-tensions-title">
      <h2 id="diagram-tensions-title">Cross-cluster tensions</h2>
      <p class="caption">
        Conditional inline-SVG directed graph (Mermaid <code>flowchart TD</code>
        kept as a collapsed export adjunct beneath it). Rendered only when at
        least one cross-cluster tension was surfaced; otherwise emits a
        deterministic "no tensions" note so the section header is always
        structurally present.
      </p>
      {{TENSIONS_BLOCK}}
    </section>

    {{SOURCE_ROSTER_BLOCK}}

    <section id="clusters" aria-labelledby="clusters-title">
      <h2 id="clusters-title">Cluster cards</h2>
      <p class="caption">
        One <code>&lt;article class="cluster-card"&gt;</code> per L2 cluster,
        grouped under <code>&lt;section class="super-theme"&gt;</code> headings
        for L3. Each card lists every member note verbatim with
        <code>[SRC: &lt;filename&gt;]</code> and a stable/drifted confidence
