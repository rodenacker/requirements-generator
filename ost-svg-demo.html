<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OST self-contained layered SVG — render demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    THROWAWAY DEMO (safe to delete). Validates the new opportunity-solution-tree
    diagram: one self-contained <svg class="tree-svg"> whose nodes AND edges share
    one viewBox coordinate space. CSS below is copied verbatim from
    framework/assets/analyses-inputs/template-opportunity-solution-trees.html so
    this is a faithful render test. Coordinates follow the TREE SVG SCHEMA
    deterministic layout (boxW=170 boxH=52 hGap=18 vGap=72 marginX=24 marginY=20).
    Open in a browser: every edge meets its node box; the wide row scrolls
    horizontally (never distorts); flagged/orphan nodes get a dashed warn stroke.
  -->
  <style>
    :root {
      --bg: #fafafa; --fg: #1a1a1a; --muted: #5a5a5a;
      --border: #d4d4d4; --border-strong: #8a8a8a;
      --out-bg: #dbdcf0; --out-border: #5a5fbf; --out-fg: #1c1f5c;
      --opp-bg: #ffe2b3; --opp-border: #d48a2a; --opp-fg: #4a2e00;
      --sol-bg: #b9d7f0; --sol-border: #4f8fbf; --sol-fg: #0c2a44;
      --asm-bg: #d8c7ee; --asm-border: #8a6ec7; --asm-fg: #2e1e55;
      --flag-warn-bg: #ffeaea; --flag-warn-border: #d44a4a; --flag-warn-fg: #8a1a1a;
      --edge-stroke: #b0b0b0; --edge-stroke-width: 1.5;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; }
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; }
    .caption { color: var(--muted); font-size: 13px; margin: 0 0 16px; }

    /* ------- tree diagram (self-contained layered SVG) — verbatim from template ------- */
    .tree-wrap {
      padding: 16px; border: 1px solid var(--border); border-radius: 6px;
      background: #fff; margin-bottom: 16px; overflow-x: auto;
    }
    .tree-svg { display: block; max-width: none; }
    .tree-svg .edge { fill: none; stroke: var(--edge-stroke); stroke-width: var(--edge-stroke-width); }
    .tree-svg .edge-out-opp { stroke: var(--out-border); }
    .tree-svg .edge-opp-sol { stroke: var(--opp-border); }
    .tree-svg .edge-sol-asm { stroke: var(--sol-border); }
    .tree-svg .edge-orphan  { stroke: var(--flag-warn-border); stroke-dasharray: 4 3; }
    .tree-svg .node rect { stroke-width: 1.5; }
    .tree-svg .node-outcome     rect { fill: var(--out-bg); stroke: var(--out-border); }
    .tree-svg .node-opportunity rect { fill: var(--opp-bg); stroke: var(--opp-border); }
    .tree-svg .node-solution    rect { fill: var(--sol-bg); stroke: var(--sol-border); }
    .tree-svg .node-assumption  rect { fill: var(--asm-bg); stroke: var(--asm-border); }
    .tree-svg .node-sentinel    rect { fill: var(--flag-warn-bg); stroke: var(--flag-warn-border); stroke-dasharray: 4 3; }
    .tree-svg .node.flagged     rect { stroke: var(--flag-warn-border); stroke-width: 2; stroke-dasharray: 4 3; }
    .tree-svg .node-outcome     text { fill: var(--out-fg); }
    .tree-svg .node-opportunity text { fill: var(--opp-fg); }
    .tree-svg .node-solution    text { fill: var(--sol-fg); }
    .tree-svg .node-assumption  text { fill: var(--asm-fg); }
    .tree-svg .node-sentinel    text { fill: var(--flag-warn-fg); }
    .tree-svg .node-id    { font: 700 10px ui-monospace, SFMono-Regular, Consolas, monospace; opacity: 0.8; }
    .tree-svg .node-label { font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .tree-svg .layer-label { font: 700 11px -apple-system, "Segoe UI", Roboto, sans-serif; fill: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em; }
  </style>
</head>
<body>
  <main>
    <h1>Opportunity Solution Tree — self-contained layered SVG (render demo)</h1>
    <p class="caption">1 outcome &rarr; 5 opportunities (+ orphan sentinel) &rarr; 8 solutions &rarr; 2 assumption tests.
       Op-2 weakly-anchored, S-8 orphan (dashed), A-2 global (dashed Outcome&rarr;A-2). viewBox 1534&times;464; scrolls if narrower.</p>

    <section class="tree-wrap" aria-label="Opportunity Solution Tree (demo)">
      <svg class="tree-svg" role="img" width="1534" height="464" viewBox="0 0 1534 464"
           aria-label="Opportunity solution tree: 1 outcome, 5 opportunities, 8 solutions, 2 assumption tests">

        <!-- 1. EDGES first (paint under nodes) -->
        <!-- Outcome(cx767,bottom72) -> Opportunities(top144), my=108 -->
        <path class="edge edge-out-opp" d="M 767 72 C 767 108 297 108 297 144"/>
        <path class="edge edge-out-opp" d="M 767 72 C 767 108 485 108 485 144"/>
        <path class="edge edge-out-opp" d="M 767 72 C 767 108 673 108 673 144"/>
        <path class="edge edge-out-opp" d="M 767 72 C 767 108 861 108 861 144"/>
        <path class="edge edge-out-opp" d="M 767 72 C 767 108 1049 108 1049 144"/>
        <!-- Opportunity(bottom196) -> Solution(top268), my=232 -->
        <path class="edge edge-opp-sol" d="M 297 196 C 297 232 109 232 109 268"/>
        <path class="edge edge-opp-sol" d="M 297 196 C 297 232 297 232 297 268"/>
        <path class="edge edge-opp-sol" d="M 485 196 C 485 232 485 232 485 268"/>
        <path class="edge edge-opp-sol" d="M 673 196 C 673 232 673 232 673 268"/>
        <path class="edge edge-opp-sol" d="M 861 196 C 861 232 861 232 861 268"/>
        <path class="edge edge-opp-sol" d="M 1049 196 C 1049 232 1049 232 1049 268"/>
        <path class="edge edge-opp-sol" d="M 1049 196 C 1049 232 1237 232 1237 268"/>
        <!-- sentinel Op-?(cx1237) -> orphan S-8(cx1425), dashed -->
        <path class="edge edge-opp-sol edge-orphan" d="M 1237 196 C 1237 232 1425 232 1425 268"/>
        <!-- Solution(bottom320) -> Assumption(top392), my=356 -->
        <path class="edge edge-sol-asm" d="M 109 320 C 109 356 673 356 673 392"/>
        <!-- Outcome -> global Assumption A-2, dashed; my(72->392)=232 -->
        <path class="edge edge-sol-asm edge-orphan" d="M 767 72 C 767 232 861 232 861 392"/>

        <!-- 2. LEFT-MARGIN row labels -->
        <text class="layer-label" x="4" y="46">Outcome</text>
        <text class="layer-label" x="4" y="170">Opportunities</text>
        <text class="layer-label" x="4" y="294">Solutions</text>
        <text class="layer-label" x="4" y="418">Assumption Tests</text>

        <!-- 3. NODES -->
        <!-- row 0: Outcome at (682,20) -->
        <g class="node node-outcome">
          <rect x="682" y="20" width="170" height="52" rx="6"/>
          <text class="node-id" x="690" y="35">Out-1</text>
          <text class="node-label" x="690" y="51"><tspan>Self-serve monthly</tspan><tspan x="690" dy="14">reporting in one app</tspan></text>
        </g>
        <!-- row 1: Opportunities + sentinel, ny=144 -->
        <g class="node node-opportunity">
          <rect x="212" y="144" width="170" height="52" rx="6"/>
          <text class="node-id" x="220" y="159">Op-1</text>
          <text class="node-label" x="220" y="175"><tspan>Ops Admin — collates</tspan><tspan x="220" dy="14">many file formats</tspan></text>
        </g>
        <g class="node node-opportunity flagged">
          <rect x="400" y="144" width="170" height="52" rx="6"/>
          <text class="node-id" x="408" y="159">Op-2</text>
          <text class="node-label" x="408" y="175"><tspan>Security Admin —</tspan><tspan x="408" dy="14">manage user access</tspan></text>
        </g>
        <g class="node node-opportunity">
          <rect x="588" y="144" width="170" height="52" rx="6"/>
          <text class="node-id" x="596" y="159">Op-3</text>
          <text class="node-label" x="596" y="175"><tspan>Ops staff — reverse a</tspan><tspan x="596" dy="14">mis-loaded month</tspan></text>
        </g>
        <g class="node node-opportunity">
          <rect x="776" y="144" width="170" height="52" rx="6"/>
          <text class="node-id" x="784" y="159">Op-4</text>
          <text class="node-label" x="784" y="175"><tspan>Ops Admin — trace</tspan><tspan x="784" dy="14">how a file processed</tspan></text>
        </g>
        <g class="node node-opportunity">
          <rect x="964" y="144" width="170" height="52" rx="6"/>
          <text class="node-id" x="972" y="159">Op-5</text>
          <text class="node-label" x="972" y="175"><tspan>Ops Admin — generate</tspan><tspan x="972" dy="14">uploads on demand</tspan></text>
        </g>
        <g class="node node-sentinel">
          <rect x="1152" y="144" width="170" height="52" rx="6"/>
          <text class="node-id" x="1160" y="159">Op-?</text>
          <text class="node-label" x="1160" y="175"><tspan>(none stated</tspan><tspan x="1160" dy="14">in inputs)</tspan></text>
        </g>
        <!-- row 2: Solutions, ny=268 -->
        <g class="node node-solution">
          <rect x="24" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="32" y="283">S-1</text>
          <text class="node-label" x="32" y="299"><tspan>Import IRESS format</tspan></text>
        </g>
        <g class="node node-solution">
          <rect x="212" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="220" y="283">S-2</text>
          <text class="node-label" x="220" y="299"><tspan>Manual capture screen</tspan></text>
        </g>
        <g class="node node-solution">
          <rect x="400" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="408" y="283">S-3</text>
          <text class="node-label" x="408" y="299"><tspan>User access screens</tspan></text>
        </g>
        <g class="node node-solution">
          <rect x="588" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="596" y="283">S-4</text>
          <text class="node-label" x="596" y="299"><tspan>Rollback imported data</tspan></text>
        </g>
        <g class="node node-solution">
          <rect x="776" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="784" y="283">S-5</text>
          <text class="node-label" x="784" y="299"><tspan>View file history</tspan></text>
        </g>
        <g class="node node-solution">
          <rect x="964" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="972" y="283">S-6</text>
          <text class="node-label" x="972" y="299"><tspan>Generate upload file</tspan></text>
        </g>
        <g class="node node-solution">
          <rect x="1152" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="1160" y="283">S-7</text>
          <text class="node-label" x="1160" y="299"><tspan>View historical returns</tspan></text>
        </g>
        <g class="node node-solution flagged">
          <rect x="1340" y="268" width="170" height="52" rx="6"/>
          <text class="node-id" x="1348" y="283">S-8</text>
          <text class="node-label" x="1348" y="299"><tspan>Client self-service</tspan><tspan x="1348" dy="14">portal (orphan)</tspan></text>
        </g>
        <!-- row 3: Assumption tests, ny=392 -->
        <g class="node node-assumption">
          <rect x="588" y="392" width="170" height="52" rx="6"/>
          <text class="node-id" x="596" y="407">A-1</text>
          <text class="node-label" x="596" y="423"><tspan>10k-row import &lt; 30s</tspan><tspan x="596" dy="14">(feasibility)</tspan></text>
        </g>
        <g class="node node-assumption">
          <rect x="776" y="392" width="170" height="52" rx="6"/>
          <text class="node-id" x="784" y="407">A-2</text>
          <text class="node-label" x="784" y="423"><tspan>Auditors accept format</tspan><tspan x="784" dy="14">(viability, global)</tspan></text>
        </g>
      </svg>
    </section>
  </main>
</body>
</html>
